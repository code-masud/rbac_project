{% extends 'base.html' %}
{% block title %}Logout - RBAC Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0"><i class="bi bi-box-arrow-right"></i> Confirm Logout</h4>
            </div>
            <div class="card-body text-center py-4">
                <i class="bi bi-question-circle display-1 text-warning mb-3"></i>
                <h5>Are you sure you want to logout?</h5>
                <p class="text-muted">You will need to login again to access your account.</p>
                
                <div class="d-flex gap-3 justify-content-center mt-4">
                    <a href="{% url 'post-list' %}" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i> Cancel
                    </a>
                    <form method="POST" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-box-arrow-right"></i> Yes, Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
