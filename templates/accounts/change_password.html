{% extends 'base.html' %}
{% block title %}Change Password - RBAC Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0"><i class="bi bi-key"></i> Change Password</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="old_password" class="form-label">Current Password</label>
                        <input type="password" name="old_password" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="new_password1" class="form-label">New Password</label>
                        <input type="password" name="new_password1" class="form-control" required>
                        <small class="text-muted">Password must be at least 8 characters.</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="new_password2" class="form-label">Confirm New Password</label>
                        <input type="password" name="new_password2" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-warning w-100">
                        <i class="bi bi-save"></i> Change Password
                    </button>
                </form>
            </div>
            <div class="card-footer text-center py-3">
                <a href="{% url 'profile' %}" class="text-decoration-none">← Back to Profile</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
