<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RBAC CMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .login-card {
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .login-card .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 1rem 1rem 0 0;
            color: white;
            text-align: center;
            padding: 2rem;
        }
        .login-card .card-body {
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-5">
                <div class="card login-card">
                    <div class="card-header">
                        <h3 class="mb-0"><i class="bi bi-shield-lock"></i> RBAC CMS Login</h3>
                        <p class="mb-0 mt-2">Sign in to your account</p>
                    </div>
                    <div class="card-body">
                        <div id="alert-container"></div>
                        
                        <form id="login-form" hx-post="/api/auth/login/" 
                              hx-headers='{"Content-Type": "application/json"}'
                              hx-swap="none" 
                              hx-on::after-request="handleLogin(event)">
                            
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" name="email" required 
                                           placeholder="user@example.com">
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                                    <input type="password" class="form-control" id="password" name="password" required 
                                           placeholder="Enter your password">
                                </div>
                            </div>
                            
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">Remember me</label>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100" id="login-btn">
                                <span class="spinner-border spinner-border-sm me-2 d-none" id="login-spinner"></span>
                                Sign In
                            </button>
                        </form>
                        
                        <hr class="my-4">
                        
                        <div class="text-center">
                            <p class="mb-0">Don't have an account? <a href="/register/" class="text-decoration-none">Register here</a></p>
                            <p class="mt-2"><small><a href="#" class="text-muted">Forgot password?</a></small></p>
                        </div>
                        
                        <div class="mt-4">
                            <p class="text-muted text-center small">Demo Credentials:</p>
                            <div class="row text-center small">
                                <div class="col">
                                    <span class="badge bg-info">Super Admin</span><br>
                                    super@admin.com / admin123
                                </div>
                                <div class="col">
                                    <span class="badge bg-warning">Moderator</span><br>
                                    moderator@test.com / mod123
                                </div>
                                <div class="col">
                                    <span class="badge bg-success">User</span><br>
                                    user1@test.com / pass123
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function handleLogin(event) {
            const xhr = event.detail.xhr;
            const response = JSON.parse(xhr.responseText);
            
            if (xhr.status === 200) {
                // Store tokens
                localStorage.setItem('access_token', response.access);
                localStorage.setItem('refresh_token', response.refresh);
                localStorage.setItem('user', JSON.stringify(response.user));
                
                // Set headers for HTMX
                document.body.setAttribute('hx-headers', JSON.stringify({
                    'Authorization': `Bearer ${response.access}`
                }));
                
                // Show success message
                showAlert('Login successful! Redirecting...', 'success');
                
                // Redirect to dashboard
                setTimeout(() => {
                    window.location.href = '/dashboard/';
                }, 1000);
            } else {
                // Show error message
                const errorMsg = response.error || response.detail || 'Invalid credentials';
                showAlert(errorMsg, 'danger');
            }
        }
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alert-container');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
            setTimeout(() => {
                const alert = alertContainer.querySelector('.alert');
                if (alert) alert.remove();
            }, 5000);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
