{% extends 'base.html' %}
{% block title %}Delete Post - RBAC Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Delete Post</h4>
            </div>
            <div class="card-body text-center py-4">
                <i class="bi bi-trash3 display-1 text-danger mb-3"></i>
                <h5>Are you sure you want to delete this post?</h5>
                <p class="text-muted">This action cannot be undone.</p>
                
                <div class="alert alert-secondary text-start mt-3">
                    <strong>{{ post.title }}</strong>
                    <p class="mb-0 small">{{ post.content|truncatewords:30 }}</p>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center mt-3">
                        <a href="{% url 'post-detail' post.id %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancel
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Yes, Delete Post
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
