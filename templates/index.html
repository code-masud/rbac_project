<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBAC Content Management System</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/custom.css">
    
    <style>
        [x-cloak] { display: none !important; }
        .htmx-indicator {
            opacity: 0;
            transition: opacity 500ms ease-in;
        }
        .htmx-request .htmx-indicator {
            opacity: 1;
        }
        .htmx-request.htmx-indicator {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Navbar Component -->
    <div id="navbar-container" hx-get="/components/navbar/" hx-trigger="load" hx-swap="outerHTML"></div>
    
    <!-- Main Content -->
    <main class="container mt-4">
        <div id="alerts-container"></div>
        
        <!-- Dynamic Content -->
        <div id="main-content">
            <div class="row">
                <div class="col-md-8 offset-md-2 text-center mt-5">
                    <h1 class="display-4">Welcome to RBAC CMS</h1>
                    <p class="lead">Role-Based Access Control Content Management System</p>
                    <hr class="my-4">
                    <p>Please login or register to access the content management features.</p>
                    <div class="mt-4">
                        <a href="/login/" class="btn btn-primary btn-lg mx-2">Login</a>
                        <a href="/register/" class="btn btn-outline-secondary btn-lg mx-2">Register</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <div id="footer-container" hx-get="/components/footer/" hx-trigger="load" hx-swap="outerHTML"></div>
    
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/htmx-config.js"></script>
    
    <script>
        // Global function to show alerts
        window.showAlert = function(message, type = 'success') {
            const alertContainer = document.getElementById('alerts-container');
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
            alertContainer.innerHTML = alertHtml;
            setTimeout(() => {
                const alert = alertContainer.querySelector('.alert');
                if (alert) alert.remove();
            }, 5000);
        };
        
        // Store token in localStorage
        window.setAuthToken = function(token) {
            localStorage.setItem('access_token', token);
            document.body.setAttribute('hx-headers', JSON.stringify({
                'Authorization': `Bearer ${token}`
            }));
        };
        
        window.getAuthToken = function() {
            return localStorage.getItem('access_token');
        };
        
        window.clearAuthToken = function() {
            localStorage.removeItem('access_token');
            document.body.removeAttribute('hx-headers');
        };
        
        // Check if user is authenticated
        window.isAuthenticated = function() {
            return !!localStorage.getItem('access_token');
        };
    </script>
</body>
</html>
